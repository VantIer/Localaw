<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localaw - Local AI Assistant</title>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f0f0;
            --bg-tertiary: #e8e8e8;
            --bg-chat: #ffffff;
            --border-color: #d0d0d0;
            --text-primary: #333;
            --text-secondary: #666;
            --text-accent: #444;
            --btn-primary: #4F46E5;
            --btn-secondary: #d0d0d0;
            --btn-danger: #dc3545;
            --status-unauth: #dc3545;
            --status-auth: #28a745;
            --cmd-bg: #e8e8e8;
            --modal-bg: #ffffff;
            --spinner-border: #e0e0e0;
            --spinner-color: #444;
            --msg-user-bg: #dde4ff;
            --msg-ai-bg: #f0f0f0;
            --file-selected-bg: #dde4ff;
        }

        [data-theme="dark"] {
            --bg-primary: #121212;
            --bg-secondary: #252525;
            --bg-tertiary: #323232;
            --bg-chat: #1e1e1e;
            --border-color: #4a4a4a;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --text-accent: #b0b0b0;
            --btn-primary: #4F46E5;
            --btn-secondary: #4a4a4a;
            --btn-danger: #dc3545;
            --status-unauth: #dc3545;
            --status-auth: #28a745;
            --cmd-bg: #2a2a2a;
            --modal-bg: #1e1e1e;
            --spinner-border: #3d3d3d;
            --spinner-color: #b0b0b0;
            --msg-user-bg: #2a3a5c;
            --msg-ai-bg: #2a2a2a;
            --file-selected-bg: #2a3a5c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--bg-secondary);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 1.2rem;
            color: var(--text-accent);
        }
        .header-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-chat);
            margin-bottom: 15px;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 10px;
            max-width: 85%;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .message span, .message div {
            tab-size: 4;
        }
        .message.user {
            background: var(--msg-user-bg);
            margin-left: auto;
        }
        .message.ai {
            background: var(--msg-ai-bg);
        }
        .message.system {
            background: var(--cmd-bg);
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .message .cmd-block {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            overflow-x: auto;
        }
        .collapsible-content {
            max-height: 200px;
            overflow: hidden;
            position: relative;
            transition: max-height 0.3s ease-out;
        }
        .collapsible-content.expanded {
            max-height: none;
        }
        .collapsible-content::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(transparent, var(--bg-tertiary));
            pointer-events: none;
        }
        .collapsible-content.expanded::after {
            display: none;
        }
        .collapsible-toggle {
            display: none;
            padding: 8px 12px;
            margin-top: 5px;
            background: var(--btn-secondary);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        .collapsible-toggle.show {
            display: inline-block;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        #messageInput {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1rem;
        }
        #messageInput:focus {
            outline: none;
            border-color: var(--btn-secondary);
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--btn-primary);
            color: #fff;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background: var(--btn-secondary);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            opacity: 0.9;
        }
        .btn-danger {
            background: var(--btn-danger);
            color: #fff;
        }
        .btn-danger:hover {
            opacity: 0.9;
        }
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            position: fixed;
            right: 0;
            top: 60px;
            bottom: 0;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 100;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar.visible {
            transform: translateX(0);
        }
        .sidebar h3 {
            font-size: 1rem;
            color: var(--text-accent);
            margin-bottom: 15px;
        }
        .theme-toggle {
            margin-bottom: 20px;
        }
        .auth-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .auth-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--status-unauth);
        }
        .status-dot.authorized {
            background: var(--status-auth);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: var(--modal-bg);
            padding: 25px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }
        .modal-content h3 {
            color: var(--text-accent);
            margin-bottom: 15px;
        }
        .modal-commands {
            background: var(--cmd-bg);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            margin: 15px 0;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .modal-cmd-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .modal-cmd-item:last-child {
            border-bottom: none;
        }
        .modal-cmd-item input[type="checkbox"] {
            margin-top: 3px;
            cursor: pointer;
        }
        .modal-cmd-item .cmd-info {
            flex: 1;
        }
        .modal-cmd-item .cmd-action {
            font-weight: bold;
            color: var(--text-accent);
        }
        .modal-cmd-item .cmd-params {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--spinner-border);
            border-top-color: var(--spinner-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .answering-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .answering-indicator.show {
            display: flex;
        }
        .answering-dots {
            display: flex;
            gap: 4px;
        }
        .answering-dots span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .answering-dots span:nth-child(1) { animation-delay: -0.32s; }
        .answering-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .command-panel {
            display: none;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
        }
        .command-panel.visible {
            display: block;
        }
        .command-input-area {
            display: flex;
            gap: 10px;
        }
        #commandInput {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1rem;
        }
        #commandInput:focus {
            outline: none;
            border-color: var(--btn-primary);
        }
        .files-panel {
            display: none;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            z-index: 200;
            flex-direction: column;
            padding: 20px;
        }
        .files-panel.visible {
            display: flex;
        }
        .files-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .files-path-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .files-path-input {
            flex: 1;
            font-size: 0.9rem;
            padding: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-primary);
        }
        .files-path-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        #filesAccessBtn {
            padding: 8px 16px;
        }
        .files-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-chat);
        }
        .files-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .files-item:last-child {
            border-bottom: none;
        }
        .files-item:hover {
            background: var(--bg-secondary);
        }
        .files-item.selected {
            background: var(--file-selected-bg);
        }
        .files-item-icon {
            margin-right: 10px;
            font-size: 1.1rem;
        }
        .files-item-name {
            flex: 1;
        }
        .files-item-size {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-left: 10px;
        }
        .files-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 300;
        }
        .files-modal.show {
            display: flex;
        }
        .files-modal-content {
            background: var(--modal-bg);
            padding: 25px;
            border-radius: 12px;
            min-width: 300px;
        }
        .files-modal-content h3 {
            margin-bottom: 15px;
            color: var(--text-accent);
        }
        .files-modal-content input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .files-modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .files-modal-radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .files-modal-radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: var(--text-primary);
            line-height: 1;
        }
        .files-modal-radio-group input[type="radio"] {
            cursor: pointer;
            vertical-align: middle;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Localaw</h1>
        <div class="header-info">
            <span id="modelName">Model: --</span> | 
            <span id="authMode">Auth: Always</span>
        </div>
        <div class="header-buttons">
            <button class="btn btn-secondary" id="commandToggleBtn" style="padding: 8px 12px; font-size: 0.85rem;">
                Command
            </button>
            <button class="btn btn-secondary" id="filesToggleBtn" style="padding: 8px 12px; font-size: 0.85rem;">
                FileManager
            </button>
            <button class="btn btn-secondary" id="sidebarToggleBtn" style="padding: 8px 12px; font-size: 0.85rem;">
                Controls
            </button>
        </div>
    </div>

    <div class="command-panel" id="commandPanel">
        <div class="command-input-area">
            <input type="text" id="commandInput" placeholder="Enter command..." autocomplete="off">
            <button class="btn btn-primary" id="commandExecuteBtn">Execute</button>
        </div>
    </div>

    <div class="files-panel" id="filesPanel">
        <div class="files-toolbar">
            <button class="btn btn-secondary" id="filesRefreshBtn">Refresh</button>
            <button class="btn btn-secondary" id="filesParentBtn">Parent Dir</button>
            <button class="btn btn-secondary" id="filesNewBtn">New</button>
            <button class="btn btn-secondary" id="filesCopyBtn">Copy</button>
            <button class="btn btn-secondary" id="filesMoveBtn">Move</button>
            <button class="btn btn-secondary" id="filesDeleteBtn">Delete</button>
            <button class="btn btn-secondary" id="filesUploadBtn">Upload</button>
            <button class="btn btn-secondary" id="filesDownloadBtn">Download</button>
            <input type="file" id="filesUploadInput" style="display: none;">
        </div>
        <div class="files-path-container">
            <input type="text" class="files-path-input" id="filesPathInput" placeholder="Enter path...">
            <button class="btn btn-secondary" id="filesAccessBtn">Access</button>
        </div>
        <div class="files-list" id="filesList"></div>
    </div>

    <div class="files-modal" id="filesModal">
        <div class="files-modal-content">
            <h3 id="filesModalTitle">New</h3>
            <input type="text" id="filesModalInput" placeholder="Enter name..." value="New">
            <div class="files-modal-radio-group">
                <label><input type="radio" name="filesModalType" value="file" checked> File</label>
                <label><input type="radio" name="filesModalType" value="dir"> Dir</label>
            </div>
            <div class="files-modal-actions">
                <button class="btn btn-secondary" id="filesModalCancel">Cancel</button>
                <button class="btn btn-primary" id="filesModalConfirm">Create</button>
            </div>
        </div>
    </div>

    <div class="files-modal" id="filesPathModal">
        <div class="files-modal-content">
            <h3 id="filesPathModalTitle">Copy/Move</h3>
            <input type="text" id="filesPathModalInput" placeholder="Enter destination path...">
            <div class="files-modal-actions">
                <button class="btn btn-secondary" id="filesPathModalCancel">Cancel</button>
                <button class="btn btn-primary" id="filesPathModalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="chat-container">
            <div class="chat-box" id="chatBox">
            </div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>Processing...</div>
            </div>
            <div class="answering-indicator" id="answeringIndicator">
                <div class="answering-dots">
                    <span></span><span></span><span></span>
                </div>
                <span id="answeringText">AI is thinking...</span>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off">
                <button class="btn btn-primary" id="sendBtn">Send</button>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <div class="theme-toggle">
                <button class="btn btn-secondary" id="themeToggle" style="width: 100%;">
                    Switch to Dark Mode
                </button>
            </div>

            <div class="auth-section">
                <h3>Authorization</h3>
                <div class="auth-status">
                    <div class="status-dot" id="authDot"></div>
                    <span id="authStatus">Not Authorized</span>
                </div>
                <button class="btn btn-secondary" id="authToggle" style="width: 100%; margin-top: 10px;">
                    Enable Session Auth
                </button>
            </div>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #333;">
                <button class="btn btn-danger" id="resetBtn" style="width: 100%;">
                    Reset Conversation
                </button>
            </div>
        </div>
    </div>

    <div class="modal" id="cmdModal">
        <div class="modal-content">
            <h3>Command Authorization</h3>
            <p>The AI has requested to execute the following commands:</p>
            <div class="modal-commands" id="modalCommands"></div>
            <p>Select commands to authorize:</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="modalCancel">Cancel</button>
                <button class="btn btn-secondary" id="modalSelectAll">Select All</button>
                <button class="btn btn-primary" id="modalAuthorizeSelected">Authorize Selected</button>
            </div>
        </div>
    </div>

    <script>
        let currentCommands = [];
        let needAuth = false;
        let sessionAuthorized = false;
        let pendingAuthCommands = null;
        let modalCommandsList = [];

        const chatBox = document.getElementById('chatBox');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loading = document.getElementById('loading');
        const cmdModal = document.getElementById('cmdModal');
        const modalCommands = document.getElementById('modalCommands');
        const authDot = document.getElementById('authDot');
        const authStatus = document.getElementById('authStatus');
        const authToggle = document.getElementById('authToggle');
        const resetBtn = document.getElementById('resetBtn');
        const answeringIndicator = document.getElementById('answeringIndicator');
        const answeringText = document.getElementById('answeringText');

        async function loadConfig() {
            const res = await fetch('/api/config');
            const config = await res.json();
            document.getElementById('modelName').textContent = 'Model: ' + config.model;
            sessionAuthorized = config.session_authorized;
            updateAuthUI(config.auth_mode, config.session_authorized);
        }

        function updateAuthUI(mode, sessionAuth) {
            document.getElementById('authMode').textContent = 'Auth: ' + (mode === 'session' ? 'Session' : 'Always');
            if (sessionAuth && mode === 'session') {
                authDot.classList.add('authorized');
                authStatus.textContent = 'Session Authorized';
                authToggle.textContent = 'Disable Session Auth';
            } else {
                authDot.classList.remove('authorized');
                authStatus.textContent = 'Not Authorized';
                authToggle.textContent = 'Enable Session Auth';
            }
        }

        function extractTextContent(text) {
            if (!text) return '';
            const str = String(text);
            try {
                if (str.startsWith('{') && str.endsWith('}')) {
                    const obj = JSON.parse(str);
                    if (obj.content && typeof obj.content === 'string') {
                        return obj.content;
                    }
                }
            } catch {}
            return str;
        }

        function addMessage(content, type, commands = null) {
            if (content === null || content === undefined) content = '';
            const div = document.createElement('div');
            div.className = 'message ' + type;
            
            let displayText = extractTextContent(content);
            
            if (commands && commands.length > 0) {
                const parts = displayText.split(/(```json\n?[\s\S]*?```)/g);
                parts.forEach(part => {
                    if (part.match(/^```json\n?([\s\S]*?)```$/)) {
                        const json = part.replace(/^```json\n?([\s\S]*?)```$/, '$1');
                        try {
                            const obj = JSON.parse(json);
                            const cmdDiv = document.createElement('div');
                            cmdDiv.className = 'cmd-block';
                            cmdDiv.textContent = 'Action: ' + obj.action + '\nParams: ' + JSON.stringify(obj, null, 2).replace(/\t/g, '    ');
                            div.appendChild(cmdDiv);
                        } catch {
                            const cmdDiv = document.createElement('div');
                            cmdDiv.className = 'cmd-block';
                            cmdDiv.textContent = json.replace(/\t/g, '    ');
                            div.appendChild(cmdDiv);
                        }
                    } else {
                        const span = document.createElement('span');
                        span.textContent = part.replace(/\t/g, '    ');
                        div.appendChild(span);
                    }
                });
            } else {
                const span = document.createElement('span');
                span.textContent = displayText.replace(/\t/g, '    ');
                div.appendChild(span);
            }
            
            if (type === 'system' && displayText.length > 500) {
                const contentWrapper = document.createElement('div');
                const innerContent = document.createElement('div');
                innerContent.className = 'collapsible-content';
                
                while (div.firstChild) {
                    innerContent.appendChild(div.firstChild);
                }
                contentWrapper.appendChild(innerContent);
                
                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'collapsible-toggle show';
                toggleBtn.textContent = 'Show more';
                toggleBtn.onclick = function() {
                    const isExpanded = innerContent.classList.toggle('expanded');
                    toggleBtn.textContent = isExpanded ? 'Show less' : 'Show more';
                };
                contentWrapper.appendChild(toggleBtn);
                
                div.appendChild(contentWrapper);
            }
            
            chatBox.appendChild(div);
            
            if (autoScrollEnabled) {
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        let autoScrollEnabled = true;

        function showLoading(show) {
            loading.classList.toggle('show', show);
            sendBtn.disabled = show;
            messageInput.disabled = show;
        }

        async function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg) return;

            autoScrollEnabled = true;
            addMessage(msg, 'user');
            messageInput.value = '';

            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'message ai';
            const aiContentSpan = document.createElement('span');
            aiContentSpan.textContent = '';
            aiMsgDiv.appendChild(aiContentSpan);
            chatBox.appendChild(aiMsgDiv);

            pendingAuthCommands = null;
            modalCommandsList = [];

            try {
                const formData = new FormData();
                formData.append('message', msg);

                const res = await fetch('/api/chat-stream', {
                    method: 'POST',
                    body: formData
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                switch (data.type) {
                                    case 'answering':
                                        answeringIndicator.classList.add('show');
                                        answeringText.textContent = `AI is thinking... (Round ${data.iteration})`;
                                        break;

                                    case 'chunk':
                                        aiContentSpan.textContent += data.content;
                                        if (autoScrollEnabled) {
                                            chatBox.scrollTop = chatBox.scrollHeight;
                                        }
                                        break;

                                    case 'response_done':
                                        answeringIndicator.classList.remove('show');
                                        if (data.commands && data.commands.length > 0) {
                                            currentCommands = data.commands;
                                            if (data.iteration === 1 && data.commands.length > 0 && !sessionAuthorized) {
                                                pendingAuthCommands = data.commands;
                                            }
                                        }
                                        break;

                                    case 'auth_required':
                                        answeringIndicator.classList.remove('show');
                                        modalCommandsList = [...data.commands];
                                        currentCommands = [...data.commands];
                                        break;

                                    case 'waiting_auth':
                                        showCommandModal(modalCommandsList.length > 0 ? modalCommandsList : currentCommands);
                                        break;

                                    case 'executing':
                                        answeringText.textContent = 'Executing commands...';
                                        answeringIndicator.classList.add('show');
                                        break;

                                    case 'execution_done':
                                        answeringIndicator.classList.remove('show');
                                        if (data.results) {
                                            for (const ex of data.results) {
                                                let cmdInfo = '';
                                                if (ex.action === 'exec_cmd' && ex.params && ex.params.command) {
                                                    cmdInfo = ` [${ex.params.command}]`;
                                                } else if (ex.params && ex.params.path) {
                                                    cmdInfo = ` [${ex.params.path}]`;
                                                }
                                                const msg = `[${ex.action}]${cmdInfo}\n${ex.result}`;
                                                addMessage(msg, 'system');
                                            }
                                        }
                                        break;

                                    case 'done':
                                        pendingAuthCommands = null;
                                        break;

                                    case 'error':
                                        aiContentSpan.textContent += `\n[Error: ${data.error}]`;
                                        answeringIndicator.classList.remove('show');
                                        break;

                                    case 'auth_denied':
                                        addMessage(data.message || 'Authorization denied', 'system');
                                        break;
                                }
                            } catch (e) {}
                        }
                    }
                }

                await loadConfig();
            } catch (err) {
                addMessage('Error: ' + err.message, 'system');
                answeringIndicator.classList.remove('show');
            } finally {
                pendingAuthCommands = null;
                modalCommandsList = [];
                currentCommands = [];
            }
        }

        function showCommandModal(commands) {
            modalCommands.innerHTML = '';
            commands.forEach((cmd, index) => {
                const item = document.createElement('div');
                item.className = 'modal-cmd-item';
                item.innerHTML = `
                    <input type="checkbox" id="cmd-${index}" checked>
                    <div class="cmd-info">
                        <div class="cmd-action">${index + 1}. ${cmd.action}</div>
                        <div class="cmd-params">${JSON.stringify(cmd, null, 2).replace(/\n/g, '<br>')}</div>
                    </div>
                `;
                modalCommands.appendChild(item);
            });
            cmdModal.classList.add('show');
        }

        async function executeSelectedCommands(selectedIndices) {
            const commandsToExecute = modalCommandsList.length > 0 ? modalCommandsList : (currentCommands.length > 0 ? currentCommands : pendingAuthCommands);
            
            if (!commandsToExecute || commandsToExecute.length === 0) {
                addMessage('Error: No commands available. Please try again.', 'system');
                cmdModal.classList.remove('show');
                try {
                    const formData = new FormData();
                    formData.append('authorized', 'false');
                    formData.append('commands', JSON.stringify([]));
                    await fetch('/api/authorize-execute', {
                        method: 'POST',
                        body: formData
                    });
                } catch (e) {}
                modalCommandsList = [];
                currentCommands = [];
                pendingAuthCommands = null;
                return;
            }

            if (selectedIndices.length === 0) {
                addMessage('No commands selected.', 'system');
                cmdModal.classList.remove('show');
                try {
                    const formData = new FormData();
                    formData.append('authorized', 'false');
                    formData.append('commands', JSON.stringify([]));
                    await fetch('/api/authorize-execute', {
                        method: 'POST',
                        body: formData
                    });
                } catch (e) {}
                modalCommandsList = [];
                currentCommands = [];
                pendingAuthCommands = null;
                return;
            }

            const selectedCommands = selectedIndices.map(idx => commandsToExecute[idx]).filter(cmd => cmd);

            if (selectedCommands.length === 0) {
                addMessage('Error: No valid commands selected.', 'system');
                cmdModal.classList.remove('show');
                try {
                    const formData = new FormData();
                    formData.append('authorized', 'false');
                    formData.append('commands', JSON.stringify([]));
                    await fetch('/api/authorize-execute', {
                        method: 'POST',
                        body: formData
                    });
                } catch (e) {}
                modalCommandsList = [];
                currentCommands = [];
                pendingAuthCommands = null;
                return;
            }

            cmdModal.classList.remove('show');

            try {
                const formData = new FormData();
                formData.append('authorized', 'true');
                formData.append('commands', JSON.stringify(selectedCommands));
                const res = await fetch('/api/authorize-execute', {
                    method: 'POST',
                    body: formData
                });
                if (!res.ok) {
                    addMessage(`Error: Authorization failed with status ${res.status}`, 'system');
                }
            } catch (err) {
                addMessage('Error: ' + err.message, 'system');
            } finally {
                modalCommandsList = [];
                currentCommands = [];
                pendingAuthCommands = null;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('modalCancel').addEventListener('click', async () => {
            cmdModal.classList.remove('show');
            addMessage('Command execution cancelled by user.', 'system');
            try {
                const formData = new FormData();
                formData.append('authorized', 'false');
                formData.append('commands', JSON.stringify([]));
                await fetch('/api/authorize-execute', {
                    method: 'POST',
                    body: formData
                });
            } catch (e) {}
            modalCommandsList = [];
            currentCommands = [];
        });

        document.getElementById('modalSelectAll').addEventListener('click', () => {
            const checkboxes = modalCommands.querySelectorAll('input[type="checkbox"]');
            const allChecked = Array.from(checkboxes).every(cb => cb.checked);
            checkboxes.forEach(cb => cb.checked = !allChecked);
        });

        document.getElementById('modalAuthorizeSelected').addEventListener('click', () => {
            const selectedIndices = [];
            const checkboxes = modalCommands.querySelectorAll('input[type="checkbox"]');
            checkboxes.forEach((cb, i) => {
                if (cb.checked) selectedIndices.push(i);
            });
            executeSelectedCommands(selectedIndices);
        });

        authToggle.addEventListener('click', async () => {
            const currentMode = document.getElementById('authMode').textContent;
            const newMode = currentMode.includes('Always') ? 'session' : 'always';
            
            const formData = new FormData();
            formData.append('mode', newMode);

            await fetch('/api/set-auth', {
                method: 'POST',
                body: formData
            });
            await loadConfig();
        });

        resetBtn.addEventListener('click', async () => {
            await fetch('/api/reset', { method: 'POST' });
            chatBox.innerHTML = '<div class="message system">Conversation reset.</div>';
            await loadConfig();
        });

        const themeToggle = document.getElementById('themeToggle');
        function setTheme(dark) {
            if (dark) {
                document.body.setAttribute('data-theme', 'dark');
                themeToggle.textContent = 'Switch to Light Mode';
            } else {
                document.body.removeAttribute('data-theme');
                themeToggle.textContent = 'Switch to Dark Mode';
            }
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }
        themeToggle.addEventListener('click', () => {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            setTheme(!isDark);
        });
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            setTheme(true);
        }

        chatBox.addEventListener('scroll', () => {
            const isAtBottom = chatBox.scrollHeight - chatBox.clientHeight - chatBox.scrollTop < 50;
            autoScrollEnabled = isAtBottom;
        });

        const sidebar = document.getElementById('sidebar');
        const sidebarToggleBtn = document.getElementById('sidebarToggleBtn');

        const commandToggleBtn = document.getElementById('commandToggleBtn');
        const commandPanel = document.getElementById('commandPanel');
        const commandInput = document.getElementById('commandInput');
        const commandExecuteBtn = document.getElementById('commandExecuteBtn');

        function closeAllPanels() {
            sidebar.classList.remove('visible');
            commandPanel.classList.remove('visible');
            filesPanel.classList.remove('visible');
        }

        sidebarToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (sidebar.classList.contains('visible')) {
                closeAllPanels();
            } else {
                closeAllPanels();
                sidebar.classList.add('visible');
            }
        });

        commandToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (commandPanel.classList.contains('visible')) {
                closeAllPanels();
            } else {
                closeAllPanels();
                commandPanel.classList.add('visible');
                commandInput.focus();
            }
        });

        const filesToggleBtn = document.getElementById('filesToggleBtn');
        const filesPanel = document.getElementById('filesPanel');
        const filesList = document.getElementById('filesList');
        const filesPathInput = document.getElementById('filesPathInput');
        const filesAccessBtn = document.getElementById('filesAccessBtn');
        const filesModal = document.getElementById('filesModal');
        const filesModalTitle = document.getElementById('filesModalTitle');
        const filesModalInput = document.getElementById('filesModalInput');
        const filesModalConfirm = document.getElementById('filesModalConfirm');
        const filesModalCancel = document.getElementById('filesModalCancel');
        const filesUploadInput = document.getElementById('filesUploadInput');
        const filesPathModal = document.getElementById('filesPathModal');
        const filesPathModalTitle = document.getElementById('filesPathModalTitle');
        const filesPathModalInput = document.getElementById('filesPathModalInput');
        const filesPathModalConfirm = document.getElementById('filesPathModalConfirm');
        const filesPathModalCancel = document.getElementById('filesPathModalCancel');

        let selectedFile = null;
        let filesModalCallback = null;
        let filesPathModalCallback = null;

        filesToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (filesPanel.classList.contains('visible')) {
                closeAllPanels();
            } else {
                closeAllPanels();
                filesPanel.classList.add('visible');
                loadFilesList();
            }
        });

        async function loadFilesList() {
            try {
                const res = await fetch('/api/files/list');
                const data = await res.json();
                if (data.error) {
                    filesPathInput.value = 'Error: ' + data.error;
                    filesList.innerHTML = '';
                    return;
                }
                filesPathInput.value = data.current_path;
                filesList.innerHTML = '';
                selectedFile = null;
                
                data.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'files-item';
                    div.dataset.name = item.name;
                    div.dataset.isDir = item.is_dir;
                    div.innerHTML = `
                        <span class="files-item-icon">${item.is_dir ? '📁' : '📄'}</span>
                        <span class="files-item-name">${item.name}</span>
                        <span class="files-item-size">${item.is_dir ? '' : formatSize(item.size)}</span>
                    `;
                    div.addEventListener('click', () => {
                        selectFile(div, item);
                    });
                    div.addEventListener('dblclick', async () => {
                        if (item.is_dir) {
                            try {
                                const formData = new FormData();
                                formData.append('dirname', item.name);
                                const res = await fetch('/api/files/chdir', { method: 'POST', body: formData });
                                const result = await res.json();
                                if (result.error) {
                                    filesPathInput.value = 'Error: ' + result.error;
                                } else {
                                    await loadFilesList();
                                }
                            } catch (err) {
                                filesPathInput.value = 'Error: ' + err.message;
                            }
                        }
                    });
                    filesList.appendChild(div);
                });
            } catch (err) {
                filesPathInput.value = 'Error: ' + err.message;
            }
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
        }

        function selectFile(element, item) {
            document.querySelectorAll('.files-item.selected').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedFile = item;
        }

        document.getElementById('filesRefreshBtn').addEventListener('click', async () => {
            await loadFilesList();
        });

        document.getElementById('filesParentBtn').addEventListener('click', async () => {
            try {
                const res = await fetch('/api/files/parent', { method: 'POST' });
                const data = await res.json();
                if (data.error) {
                    filesPathInput.value = 'Error: ' + data.error;
                } else {
                    await loadFilesList();
                }
            } catch (err) {
                filesPathInput.value = 'Error: ' + err.message;
            }
        });

        document.getElementById('filesAccessBtn').addEventListener('click', async () => {
            const path = filesPathInput.value.trim();
            if (!path) {
                filesPathInput.value = 'Error: Please enter a path';
                return;
            }
            try {
                const formData = new FormData();
                formData.append('dirname', path);
                const res = await fetch('/api/files/chdir', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.error) {
                    filesPathInput.value = 'Error: ' + data.error;
                } else {
                    await loadFilesList();
                }
            } catch (err) {
                filesPathInput.value = 'Error: ' + err.message;
            }
        });

        filesPathInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                filesAccessBtn.click();
            }
        });

        document.getElementById('filesNewBtn').addEventListener('click', () => {
            filesModalTitle.textContent = 'New';
            filesModalInput.value = 'New';
            document.querySelector('input[name="filesModalType"][value="file"]').checked = true;
            filesModalConfirm.textContent = 'Create';
            filesModalCallback = async () => {
                const name = filesModalInput.value.trim() || 'New';
                const type = document.querySelector('input[name="filesModalType"]:checked').value;
                try {
                    const formData = new FormData();
                    if (type === 'file') {
                        formData.append('filename', name);
                        await fetch('/api/files/new', { method: 'POST', body: formData });
                    } else {
                        formData.append('dirname', name);
                        await fetch('/api/files/mkdir', { method: 'POST', body: formData });
                    }
                    await loadFilesList();
                } catch (err) {}
            };
            filesModal.classList.add('show');
            filesModalInput.focus();
            filesModalInput.select();
        });

        document.getElementById('filesDeleteBtn').addEventListener('click', async () => {
            if (!selectedFile) {
                alert('Please select a file or directory to delete.');
                return;
            }
            if (!confirm(`Delete "${selectedFile.name}"?`)) return;
            try {
                const formData = new FormData();
                formData.append('filepath', filesPathInput.value + '/' + selectedFile.name);
                const res = await fetch('/api/files/delete', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    await loadFilesList();
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });

        document.getElementById('filesUploadBtn').addEventListener('click', () => {
            filesUploadInput.click();
        });

        filesUploadInput.addEventListener('change', async () => {
            const file = filesUploadInput.files[0];
            if (!file) return;
            try {
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch('/api/files/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    await loadFilesList();
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
            filesUploadInput.value = '';
        });

        document.getElementById('filesDownloadBtn').addEventListener('click', () => {
            if (!selectedFile || selectedFile.is_dir) {
                alert('Please select a file to download.');
                return;
            }
            const path = filesPathInput.value + '/' + selectedFile.name;
            window.open('/api/files/download?path=' + encodeURIComponent(path), '_blank');
        });

        filesModalCancel.addEventListener('click', () => {
            filesModal.classList.remove('show');
        });

        filesModalConfirm.addEventListener('click', () => {
            if (filesModalCallback) {
                filesModalCallback();
            }
            filesModal.classList.remove('show');
        });

        filesModalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                filesModalConfirm.click();
            }
        });

        document.getElementById('filesCopyBtn').addEventListener('click', () => {
            if (!selectedFile) {
                alert('Please select a file or directory to copy.');
                return;
            }
            const srcPath = filesPathInput.value + '/' + selectedFile.name;
            filesPathModalTitle.textContent = 'Copy: ' + selectedFile.name;
            filesPathModalInput.value = srcPath;
            filesPathModalConfirm.textContent = 'Copy';
            filesPathModalCallback = async (destPath) => {
                if (!destPath) {
                    alert('Please enter a destination path.');
                    return;
                }
                try {
                    const formData = new FormData();
                    formData.append('src', srcPath);
                    formData.append('dest', destPath);
                    const res = await fetch('/api/files/copy', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.error) {
                        alert('Error: ' + data.error);
                    } else {
                        await loadFilesList();
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            };
            filesPathModal.classList.add('show');
            filesPathModalInput.focus();
            filesPathModalInput.select();
        });

        document.getElementById('filesMoveBtn').addEventListener('click', () => {
            if (!selectedFile) {
                alert('Please select a file or directory to move.');
                return;
            }
            const srcPath = filesPathInput.value + '/' + selectedFile.name;
            filesPathModalTitle.textContent = 'Move: ' + selectedFile.name;
            filesPathModalInput.value = srcPath;
            filesPathModalConfirm.textContent = 'Move';
            filesPathModalCallback = async (destPath) => {
                if (!destPath) {
                    alert('Please enter a destination path.');
                    return;
                }
                try {
                    const formData = new FormData();
                    formData.append('src', srcPath);
                    formData.append('dest', destPath);
                    const res = await fetch('/api/files/move', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.error) {
                        alert('Error: ' + data.error);
                    } else {
                        await loadFilesList();
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            };
            filesPathModal.classList.add('show');
            filesPathModalInput.focus();
            filesPathModalInput.select();
        });

        filesPathModalCancel.addEventListener('click', () => {
            filesPathModal.classList.remove('show');
        });

        filesPathModalConfirm.addEventListener('click', () => {
            const value = filesPathModalInput.value.trim();
            if (filesPathModalCallback) {
                filesPathModalCallback(value);
            }
            filesPathModal.classList.remove('show');
        });

        filesPathModalInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                filesPathModalConfirm.click();
            }
        });

        function formatCommandResult(ex) {
            const action = ex.action;
            const params = ex.params || {};
            if (action === 'exec_cmd') {
                const cmdStr = params.command || '';
                return `[${action}] [${cmdStr}]\n${ex.result}`;
            } else if (action === 'write_file') {
                const path = params.path || '';
                return `[${action}] [${path}]\n${ex.result}`;
            } else {
                const path = params.path || '';
                return `[${action}] [${path}]\n${ex.result}`;
            }
        }

        async function executeDirectCommand(cmd) {
            try {
                const formData = new FormData();
                formData.append('command', cmd);

                const res = await fetch('/api/exec-cmd', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();
                if (data.error) {
                    return `[exec_cmd] [${cmd}]\nError: ${data.error}`;
                } else {
                    return `[exec_cmd] [${cmd}]\n${data.result}`;
                }
            } catch (err) {
                return `[exec_cmd] [${cmd}]\nError: ${err.message}`;
            }
        }

        async function sendDirectCommand() {
            const cmd = commandInput.value.trim();
            if (!cmd) return;

            addMessage(cmd, 'user');
            commandInput.value = '';

            commandExecuteBtn.disabled = true;
            const result = await executeDirectCommand(cmd);
            addMessage(result, 'system');
            commandExecuteBtn.disabled = false;
        }

        commandExecuteBtn.addEventListener('click', sendDirectCommand);
        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendDirectCommand();
        });

        loadConfig();
    </script>
</body>
</html>
